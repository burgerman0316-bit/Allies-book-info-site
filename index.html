<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT Circles Project | Allies By Alan Gratz</title>
    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --card-bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* CORRECTED LIQUID LENS ENGINE */
        .nav-container {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 750px;
            z-index: 1000;
        }

        nav {
            position: relative;
            padding: 0.7rem 2.5rem;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-radius: 100px;
            
            /* High-spec glass optics */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(1px) saturate(200%) contrast(150%) brightness(110%);
            -webkit-backdrop-filter: blur(1px) saturate(200%) contrast(150%) brightness(110%);
            
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.9),
                inset 0 1px 3px rgba(255, 255, 255, 0.4);
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        header {
            padding: 240px 20px 100px 20px;
            text-align: center;
            /* Applies the warp effect to the content behind */
            filter: url(#refraction-lens);
        }

        header h1 {
            font-size: clamp(3.5rem, 12vw, 7rem);
            letter-spacing: 12px;
            text-transform: uppercase;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            padding: 80px 0;
            border-bottom: 1px solid var(--border);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        details {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        details[open] { border-color: #ffffff; }

        summary {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            list-style: none;
        }

        .expand-content {
            margin-top: 20px;
            color: var(--text-dim);
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        footer {
            text-align: center;
            padding: 120px 20px;
            opacity: 0.2;
            font-size: 0.7rem;
        }

        .svg-filters {
            position: absolute;
            visibility: hidden;
            width: 0; height: 0;
        }
    </style>
</head>
<body>

    <svg class="svg-filters">
        <filter id="refraction-lens">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" id="lens-warp" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="nav-container">
        <nav>
            <a href="#home">Home</a>
            <a href="#summary">Summary</a>
            <a href="#theme">Theme</a>
            <a href="#pov">Characters</a>
            <a href="#glossary">Glossary</a>
        </nav>
    </div>

    <header id="home">
        <h1 id="hero-title">ALLIES</h1>
        <p style="letter-spacing: 6px; opacity: 0.5; margin-top: 10px;">BY: ALAN GRATZ</p>
    </header>

    <div class="container">
        <section id="summary">
            <h2>Summary</h2>
            <details name="allies"><summary>View</summary><div class="expand-content"><p>[ ]</p></div></details>
        </section>

        <section id="theme">
            <h2>Theme</h2>
            <details name="allies"><summary>View</summary><div class="expand-content"><p>[ ]</p></div></details>
        </section>

        <section id="pov">
            <h2>Characters</h2>
            <div class="grid">
                <details class="char-card" name="chars"><summary>POV 01</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>POV 02</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>POV 03</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>POV 04</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>POV 05</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>POV 06</summary><div class="expand-content"><p>[ ]</p></div></details>
            </div>
        </section>

        <section id="glossary">
            <h2>Glossary</h2>
            <details name="allies"><summary>View</summary><div class="expand-content"><p>[ ]</p></div></details>
        </section>
    </div>

    <footer>
        <p>LIT CIRCLES PROJECT &bull; 2026</p>
    </footer>

    <script>
        const lensWarp = document.getElementById('lens-warp');
        const heroTitle = document.getElementById('hero-title');
        
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            
            // Refraction logic: Only warps when text is near top (under nav)
            if (scroll < 350) {
                // Negative scale creates the 'outward' magnification look
                const intensity = (scroll / 12);
                lensWarp.setAttribute('scale', intensity.toString());
                
                // Subtle lift to keep the text centered in the lens
                heroTitle.style.transform = `translateY(${scroll * 0.15}px)`;
            } else {
                lensWarp.setAttribute('scale', '0');
            }
        });
    </script>

</body>
</html>
