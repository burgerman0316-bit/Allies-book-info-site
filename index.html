<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT Circles Project | Allies By Alan Gratz</title>
    <link rel="icon" type="image/x-icon" href="favicon a.png">
    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --card-bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* LIQUID LENS ENGINE 
           High-contrast optics with 1px precision 
        */
        .nav-wrapper {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 750px;
            z-index: 2000;
        }

        nav {
            position: relative;
            padding: 0.8rem 2.5rem;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-radius: 100px;
            
            /* The Glass Core: Minimal blur, Maximum saturation */
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(1px) saturate(220%) contrast(140%) brightness(115%);
            -webkit-backdrop-filter: blur(1px) saturate(220%) contrast(140%) brightness(115%);
            
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.8),
                inset 0 1px 4px rgba(255, 255, 255, 0.4), /* Surface highlight */
                inset 0 -1px 2px rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        nav a:hover { opacity: 1; }

        /* THE REFRACTION ZONE 
           This container holds everything that should "bend" 
        */
        .refraction-content {
            filter: url(#liquid-lens); /* The SVG Displacement Engine */
            will-change: transform;
        }

        header {
            padding: 240px 20px 100px 20px;
            text-align: center;
        }

        header h1 {
            font-size: clamp(3.5rem, 12vw, 7rem);
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 0;
            transition: transform 0.1s linear;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            padding: 80px 0;
            border-bottom: 1px solid var(--border);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Functional Grid */
        details {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        details[open] { border-color: #ffffff; }

        summary {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            list-style: none;
        }

        .expand-content {
            margin-top: 20px;
            color: var(--text-dim);
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        footer {
            text-align: center;
            padding: 120px 20px;
            opacity: 0.2;
            font-size: 0.7rem;
        }

        /* Hidden SVG Filter */
        .svg-defs {
            position: absolute;
            width: 0; height: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <svg class="svg-defs">
        <filter id="liquid-lens">
            <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="1" result="warp" />
            <feDisplacementMap in="SourceGraphic" in2="warp" scale="0" id="lens-control" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="nav-wrapper">
        <nav>
            <a href="#home">Home</a>
            <a href="#summary">Summary</a>
            <a href="#theme">Theme</a>
            <a href="#pov">Characters</a>
            <a href="#glossary">Glossary</a>
        </nav>
    </div>

    <div class="refraction-content">
        <header id="home">
            <h1 id="hero-text">ALLIES</h1>
            <p style="letter-spacing: 6px; opacity: 0.5; margin-top: 10px;">BY: ALAN GRATZ</p>
        </header>

        <div class="container">
            <section id="summary">
                <h2>Summary</h2>
                <details name="main"><summary>View</summary><div class="expand-content"><p>[ ]</p></div></details>
            </section>

            <section id="theme">
                <h2>Theme</h2>
                <details name="main"><summary>View</summary><div class="expand-content"><p>[ ]</p></div></details>
            </section>

            <section id="pov">
                <h2>Characters</h2>
                <div class="grid">
                    <details class="char-card" name="chars"><summary>POV 01</summary><div class="expand-content"><p>[ ]</p></div></details>
                    <details class="char-card" name="chars"><summary>POV 02</summary><div class="expand-content"><p>[ ]</p></div></details>
                    <details class="char-card" name="chars"><summary>POV 03</summary><div class="expand-content"><p>[ ]</p></div></details>
                    <details class="char-card" name="chars"><summary>POV 04</summary><div class="expand-content"><p>[ ]</p></div></details>
                    <details class="char-card" name="chars"><summary>POV 05</summary><div class="expand-content"><p>[ ]</p></div></details>
                    <details class="char-card" name="chars"><summary>POV 06</summary><div class="expand-content"><p>[ ]</p></div></details>
                </div>
            </section>

            <section id="glossary">
                <h2>Glossary</h2>
                <details name="main"><summary>View</summary><div class="expand-content"><p>[ ]</p></div></details>
            </section>
        </div>
    </div>

    <footer>
        <p>LIT CIRCLES PROJECT &bull; 2026</p>
    </footer>

    <script>
        const lens = document.getElementById('lens-control');
        const hero = document.getElementById('hero-text');
        
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            
            // Only trigger refraction when the header is in the 'Danger Zone' (top 300px)
            if (scroll < 350) {
                // Physical displacement: increases scale to 'stretch' the pixels
                const warpAmount = (scroll / 10); 
                lens.setAttribute('scale', warpAmount.toString());
                
                // Parallax lift: compensates for displacement to keep text centered in glass
                hero.style.transform = `translateY(${scroll * 0.1}px)`;
            } else {
                // Reset to zero when out of view for performance
                lens.setAttribute('scale', '0');
            }
        });
    </script>

</body>
</html>
