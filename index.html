<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION LOG | Allies By Alan Gratz</title>
    <link rel="icon" type="image/x-icon" href="favicon a.png">
    <style>
        :root {
            --army-green: #3d4034;
            --drab: #2b2d24;
            --stencils-sand: #c2b280;
            --folder-tan: #b9a97a;
            --ink-black: #1a1a1a;
            --border-rust: #4a4a4a;
            --paper: #dcd0b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--army-green);
            background-image: radial-gradient(var(--drab) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--stencils-sand);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* TACTICAL NAV */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 850px;
            padding: 1rem;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: var(--ink-black);
            border: 2px solid var(--border-rust);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        nav a {
            color: var(--stencils-sand);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            opacity: 0.7;
            transition: 0.3s;
        }

        nav a:hover { 
            opacity: 1; 
            color: #fff;
            text-shadow: 0 0 5px #fff;
        }

        header {
            padding: 180px 20px 60px 20px;
            text-align: center;
        }

        .classified-stamp {
            display: inline-block;
            border: 4px solid #7a2a2a;
            color: #7a2a2a;
            padding: 5px 15px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            transform: rotate(-5deg);
            margin-bottom: 20px;
            letter-spacing: 5px;
            opacity: 0.8;
        }

        header h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #fff;
            -webkit-text-stroke: 1px var(--stencils-sand);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            padding: 60px 0;
            border-bottom: 1px solid var(--border-rust);
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            background: var(--ink-black);
            display: inline-block;
            padding: 5px 15px;
        }

        /* MISSION FOLDER DROPDOWNS */
        details {
            background: var(--paper);
            color: var(--ink-black);
            border: 1px solid #000;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 5px 5px 0px var(--ink-black);
        }

        details[open] {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--ink-black);
        }

        summary {
            padding: 15px 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            list-style: none;
            cursor: pointer;
            border-bottom: 1px dashed var(--ink-black);
        }

        summary::before {
            content: "FILE: ";
            opacity: 0.5;
        }

        .content-inner {
            padding: 20px;
            font-size: 0.95rem;
            border-left: 10px solid var(--army-green);
        }

        /* STRATEGIC TIMELINE */
        .timeline {
            position: relative;
            padding-left: 50px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 0;
            width: 4px;
            height: 100%;
            background: var(--ink-black);
        }

        .event {
            position: relative;
            margin-bottom: 25px;
        }

        .event::before {
            content: '';
            position: absolute;
            left: -53px;
            top: 20px;
            width: 20px;
            height: 20px;
            background: var(--army-green);
            border: 4px solid var(--ink-black);
            z-index: 2;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        footer {
            text-align: center;
            padding: 100px 20px;
            opacity: 0.5;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#summary">Summary</a>
        <a href="#timeline">Timeline</a>
        <a href="#pov">Characters</a>
        <a href="#theme">Theme</a>
    </nav>

    <header id="home">
        <h1>ALLIES</h1>
        <p style="letter-spacing: 4px; color: var(--stencils-sand);">By: Alan Gratz</p>
    </header>

    <div class="container">
        
        <section id="summary">
            <h2>Summary</h2>
            <details>
                <summary>Notes</summary>
                <div class="content-inner">
                    <p>[ ]</p>
                </div>
            </details>
        </section>

        <section id="timeline">
            <h2>Timeline</h2>
            <div class="timeline">
                <div class="event">
                    <details><summary>Event 1</summary><div class="content-inner"><p>[ ]</p></div></details>
                </div>
            </div>
        </section>

        <section id="pov">
            <h2>Active Personnel</h2>
            <div class="grid">
                <details><summary>Dee Carpenter</summary><div class="content-inner"><p>[ Status: ]</p></div></details>
            </div>
        </section>

        <section id="theme">
            <h2>Themes</h2>
            <details>
                <summary>The Main Idea</summary>
                <div class="content-inner">
                    <p>[ ]</p>
                </div>
            </details>
        </section>
    </div>

    <script>
        class Accordion {
          constructor(el) {
            this.el = el;
            this.summary = el.querySelector('summary');
            this.content = el.querySelector('.content-inner');
            this.animation = null;
            this.isClosing = false;
            this.isExpanding = false;
            this.summary.addEventListener('click', (e) => this.onClick(e));
          }

          onClick(e) {
            e.preventDefault();
            this.el.style.overflow = 'hidden';
            if (this.isClosing || !this.el.open) { this.open(); } 
            else if (this.isExpanding || this.el.open) { this.shrink(); }
          }

          shrink() {
            this.isClosing = true;
            const startHeight = `${this.el.offsetHeight}px`;
            const endHeight = `${this.summary.offsetHeight}px`;
            if (this.animation) this.animation.cancel();
            this.animation = this.el.animate({ height: [startHeight, endHeight] }, { duration: 400, easing: 'cubic-bezier(0.4, 0, 0.2, 1)' });
            this.animation.onfinish = () => this.onAnimationFinish(false);
          }

          open() {
            this.el.style.height = `${this.el.offsetHeight}px`;
            this.el.open = true;
            window.requestAnimationFrame(() => this.expand());
          }

          expand() {
            this.isExpanding = true;
            const startHeight = `${this.el.offsetHeight}px`;
            const endHeight = `${this.summary.offsetHeight + this.content.offsetHeight}px`;
            if (this.animation) this.animation.cancel();
            this.animation = this.el.animate({ height: [startHeight, endHeight] }, { duration: 400, easing: 'cubic-bezier(0.4, 0, 0.2, 1)' });
            this.animation.onfinish = () => this.onAnimationFinish(true);
          }

          onAnimationFinish(open) {
            this.el.open = open;
            this.animation = null;
            this.isClosing = false;
            this.isExpanding = false;
            this.el.style.height = this.el.style.overflow = '';
          }
        }

        document.querySelectorAll('details').forEach((el) => {
          new Accordion(el);
        });
    </script>
</body>
</html>
