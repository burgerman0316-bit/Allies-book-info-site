<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT Circles Project | Allies By Alan Gratz</title>
    <link rel="icon" type="image/x-icon" href="favicon a.png">
    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --card-bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.8;
        }

        /* REFRACTIVE GLASS ENGINE 
           Simulates iPhone lens optics 
        */
        nav {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 750px;
            padding: 0.8rem 2.2rem;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 30px;
            
            /* The Glass Core */
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(220%) brightness(130%);
            -webkit-backdrop-filter: blur(25px) saturate(220%) brightness(130%);
            
            /* The Refractive Edge (Double-Layered Border) */
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.18); 
            outline: 1.5px solid rgba(255, 255, 255, 0.08); 
            outline-offset: -2px;

            /* Light Diffusion */
            box-shadow: 
                0 15px 45px rgba(0, 0, 0, 0.7),
                inset 0 0 15px rgba(255, 255, 255, 0.08), /* Soft inner light */
                inset 0 2px 4px rgba(255, 255, 255, 0.2); /* Top edge 'highlight' */
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        nav a:hover {
            opacity: 1;
            text-shadow: 0 0 15px #ffffff;
        }

        header {
            padding: 240px 20px 100px 20px;
            text-align: center;
        }

        header h1 {
            font-size: clamp(3.5rem, 12vw, 7rem);
            letter-spacing: 12px;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-dim);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            padding: 80px 0;
            border-bottom: 1px solid var(--border);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Functional Accordion */
        details {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: border 0.3s;
        }

        details[open] {
            border-color: #ffffff;
        }

        summary {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            list-style: none;
        }

        summary::before {
            content: "[+] ";
            color: var(--text-dim);
        }

        details[open] summary::before {
            content: "[-] ";
        }

        .expand-content {
            margin-top: 20px;
            color: var(--text-dim);
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .char-card summary {
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 120px 20px;
            opacity: 0.2;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }

        @media (max-width: 600px) {
            nav { width: 95%; gap: 15px; padding: 0.8rem 1rem; }
            nav a { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#summary">Summary</a>
        <a href="#theme">Theme</a>
        <a href="#pov">Characters</a>
        <a href="#glossary">Glossary</a>
    </nav>

    <header id="home">
        <h1>ALLIES</h1>
        <p>By Alan Gratz</p>
    </header>

    <div class="container">

        <section id="summary">
            <h2>Summary</h2>
            <details name="group1">
                <summary>View Summary</summary>
                <div class="expand-content">
                    <p>[ ]</p>
                </div>
            </details>
        </section>

        <section id="theme">
            <h2>Theme</h2>
            <details name="group1">
                <summary>View Theme</summary>
                <div class="expand-content">
                    <p>[ ]</p>
                </div>
            </details>
        </section>

        <section id="pov">
            <h2>Characters</h2>
            <div class="grid">
                <details class="char-card" name="chars">
                    <summary>DEE</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

                <details class="char-card" name="chars">
                    <summary>SAM</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

                <details class="char-card" name="chars">
                    <summary>JAMES</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

                <details class="char-card" name="chars">
                    <summary>MONIQUE</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

                <details class="char-card" name="chars">
                    <summary>DOROTHY</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

                <details class="char-card" name="chars">
                    <summary>BILL</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>
            </div>
        </section>

        <section id="glossary">
            <h2>Glossary</h2>
            <details name="group1">
                <summary>View Glossary</summary>
                <div class="expand-content">
                    <p>[ ]</p>
                </div>
            </details>
        </section>

    </div>

    <footer>
        <p>LIT CIRCLES PROJECT &bull; 2026</p>
    </footer>

</body>
</html>
