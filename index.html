<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT Circles Project | Allies By Alan Gratz</title>
    <link rel="icon" type="image/x-icon" href="favicon a.png">
    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --card-bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* THE LIQUID REFRACTION ENGINE 
           Uses multiple filters to warp content at the edges 
        */
        nav {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 750px;
            padding: 0.9rem 2.5rem;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 30px;
            
            /* Glass Base */
            background: rgba(255, 255, 255, 0.01);
            
            /* Refractive Stack: Blur + Saturation + Contrast Boost */
            backdrop-filter: blur(20px) saturate(250%) contrast(110%) brightness(110%);
            -webkit-backdrop-filter: blur(20px) saturate(250%) contrast(110%) brightness(110%);
            
            /* The Lens Geometry */
            border-radius: 80px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            
            /* Simulated Refraction Ring (The Edge Warp) */
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1.5px rgba(255, 255, 255, 0.1), /* Lens thickness */
                inset 0 4px 10px rgba(255, 255, 255, 0.15); /* Top refraction highlight */
            
            /* This adds the "shimmer" as you scroll */
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Simulates the content "shifting" as it enters the glass */
        nav::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.7;
            position: relative;
            z-index: 2;
        }

        nav a:hover {
            opacity: 1;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        header {
            padding: 240px 20px 100px 20px;
            text-align: center;
        }

        header h1 {
            font-size: clamp(3.5rem, 12vw, 7rem);
            letter-spacing: 12px;
            text-transform: uppercase;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            padding: 80px 0;
            border-bottom: 1px solid var(--border);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Auto-Closing Exclusive Accordion */
        details {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        details[open] {
            border-color: #ffffff;
        }

        summary {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            list-style: none;
        }

        .expand-content {
            margin-top: 20px;
            color: var(--text-dim);
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        .char-card summary {
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 120px 20px;
            opacity: 0.2;
            font-size: 0.7rem;
        }

        @media (max-width: 600px) {
            nav { width: 95%; gap: 12px; padding: 0.8rem 1rem; }
            nav a { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#summary">Summary</a>
        <a href="#theme">Theme</a>
        <a href="#pov">Characters</a>
        <a href="#glossary">Glossary</a>
    </nav>

        <section id="pov">

            <div class="grid">
                <details class="char-card" name="chars">
                    <summary>POV 01</summary>

                </details>

                <details class="char-card" name="chars">

                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

                <details class="char-card" name="chars">
                    <summary>POV 03</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

                <details class="char-card" name="chars">
                    <summary>POV 04</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

                <details class="char-card" name="chars">
                    <summary>POV 05</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

                <details class="char-card" name="chars">
                    <summary>POV 06</summary>
                    <div class="expand-content">
                        <p>[ ]</p>
                    </div>
                </details>

        <section id="glossary">
            <h2>Glossary</h2>

            </details>
        </section>

    </div>

    <footer>
        <p>LIT CIRCLES PROJECT &bull; 2026</p>
    </footer>

</body>
</html>
