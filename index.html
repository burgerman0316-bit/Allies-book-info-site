<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION LOG | Allies By Alan Gratz</title>
    <link rel="icon" type="image/x-icon" href="favicon a.png">
    <style>
        :root {
            --army-green: #3d4034;
            --drab: #2b2d24;
            --stencils-sand: #c2b280;
            --ink-black: #1a1a1a;
            --paper: #dcd0b3;
            --secret-red: #7a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--army-green);
            background-image: radial-gradient(var(--drab) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--stencils-sand);
            line-height: 1.6;
        }

        /* TACTICAL NAV */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            padding: 1rem;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 25px;
            background: var(--ink-black);
            border: 2px solid var(--stencils-sand);
            border-radius: 2px;
        }

        nav a {
            color: var(--stencils-sand);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: 0.3s;
        }

        nav a:hover { opacity: 1; color: #fff; }

        header {
            padding: 160px 20px 60px 20px;
            text-align: center;
        }

        .stamp {
            border: 3px solid var(--secret-red);
            color: var(--secret-red);
            padding: 4px 12px;
            display: inline-block;
            text-transform: uppercase;
            font-weight: 900;
            transform: rotate(-3deg);
            margin-bottom: 10px;
        }

        header h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            padding: 60px 0;
            border-bottom: 1px solid rgba(194, 178, 128, 0.2);
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            color: var(--ink-black);
            background: var(--stencils-sand);
            display: inline-block;
            padding: 2px 10px;
        }

        /* THE TEXT DROPDOWN (TRUNCATED TEXT) */
        .mission-file {
            background: var(--paper);
            color: var(--ink-black);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 2px;
            box-shadow: 4px 4px 0px var(--ink-black);
            cursor: pointer;
            transition: 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .file-label {
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
            color: var(--secret-red);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        /* This handles the "show a little bit" logic */
        .file-content {
            max-height: 3.2em; /* Shows about 2 lines of text */
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* The fade effect at the bottom of truncated text */
        .file-content::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1.5em;
            background: linear-gradient(transparent, var(--paper));
            transition: opacity 0.3s;
        }

        /* Expanded state */
        .mission-file.expanded .file-content {
            max-height: 1000px; /* Large enough to fit any text */
        }

        .mission-file.expanded .file-content::after {
            opacity: 0;
        }

        /* TIMELINE SPECIFIC */
        .timeline-wrapper {
            border-left: 3px dashed var(--stencils-sand);
            padding-left: 30px;
            margin-left: 10px;
        }

        .time-mark {
            font-weight: bold;
            background: var(--ink-black);
            color: var(--stencils-sand);
            padding: 2px 8px;
            font-size: 0.75rem;
            margin-bottom: 5px;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        footer {
            text-align: center;
            padding: 80px;
            opacity: 0.4;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Intel</a>
        <a href="#summary">Debrief</a>
        <a href="#timeline">Timeline</a>
        <a href="#pov">Personnel</a>
        <a href="#theme">Objective</a>
    </nav>

    <header id="home">
        <h1>ALLIES</h1>
        <p style="color: var(--stencils-sand); letter-spacing: 3px;">By: Alan Gratz</p>
    </header>

    <div class="container">
        
        <section id="summary">
            <h2>Summary</h2>
            <div class="mission-file" onclick="this.classList.toggle('expanded')">
                <span class="file-label">Summary: </span>
                <div class="file-content">
                    [ ]
                </div>
            </div>
        </section>

        <section id="timeline">
            <h2>Chronological Timeline</h2>
            <div class="timeline-wrapper">
                
                <div class="mission-file" onclick="this.classList.toggle('expanded')">
                    <span class="time-mark">Event 01</span>
                    <span class="file-label">Event</span>
                    <div class="file-content">[ ]</div>
                </div>
            </div>
        </section>

        <section id="pov">
            <h2>Perspectives</h2>
            <div class="grid">
                <div class="mission-file" onclick="this.classList.toggle('expanded')">
                    <span class="file-label">Perspective 01</span>
                    <div class="file-content">[ ]</div>
                </div>
            </div>
        </section>

        <section id="theme">
            <h2>Mission Objectives</h2>
            <div class="mission-file" onclick="this.classList.toggle('expanded')">
                <span class="file-label">Theme Analysis</span>
                <div class="file-content">[ ]</div>
            </div>
        </section>

    </div>
    </body>
</html>
