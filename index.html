<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT Circles Project | Allies By Alan Gratz</title>
    <link rel="icon" type="image/x-icon" href="favicon a.png">
    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --card-bg: #0a0a0a;
            --nav-w: 85%;
            --nav-max-w: 750px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* LIQUID REFRACTION ENGINE 
           The 'nav' handles the blur, while 'refractor' handles the pixel shift
        */
        .glass-container {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: var(--nav-w);
            max-width: var(--nav-max-w);
            z-index: 1000;
        }

        nav {
            position: relative;
            width: 100%;
            padding: 0.7rem 2.5rem;
            display: flex;
            justify-content: center;
            gap: 30px;
            
            /* Precision Refraction Stack */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(1px) saturate(250%) contrast(130%) brightness(115%);
            -webkit-backdrop-filter: blur(1px) saturate(250%) contrast(130%) brightness(115%);
            
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 
                0 15px 45px rgba(0, 0, 0, 0.9),
                inset 0 1px 3px rgba(255, 255, 255, 0.4);
            overflow: hidden;
        }

        /* The Magnification/Refraction Shift */
        .refraction-warp {
            position: absolute;
            inset: 0;
            border-radius: 100px;
            pointer-events: none;
            /* This scales content passing through by 5% to simulate a lens */
            transform: scale(1.05); 
            z-index: -1;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        header {
            padding: 240px 20px 100px 20px;
            text-align: center;
        }

        header h1 {
            font-size: clamp(3.5rem, 12vw, 7rem);
            letter-spacing: 12px;
            text-transform: uppercase;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            padding: 80px 0;
            border-bottom: 1px solid var(--border);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        details {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        details[open] { border-color: #ffffff; }

        summary {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            list-style: none;
        }

        .expand-content {
            margin-top: 20px;
            color: var(--text-dim);
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .char-card summary { text-align: center; }

        footer {
            text-align: center;
            padding: 120px 20px;
            opacity: 0.2;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <nav>
            <div class="refraction-warp"></div>
            <a href="#home">Home</a>
            <a href="#summary">Summary</a>
            <a href="#theme">Theme</a>
            <a href="#pov">Characters</a>
            <a href="#glossary">Glossary</a>
        </nav>
    </div>

    <header id="home">
        <h1>ALLIES</h1>
        <p>By Alan Gratz</p>
    </header>

    <div class="container">

        <section id="summary">
            <h2>Summary</h2>
            <details name="sections">
                <summary>View</summary>
                <div class="expand-content">
                    <p>[ ]</p>
                </div>
            </details>
        </section>

        <section id="theme">
            <h2>Theme</h2>
            <details name="sections">
                <summary>View</summary>
                <div class="expand-content">
                    <p>[ ]</p>
                </div>
            </details>
        </section>

        <section id="pov">
            <h2>Characters</h2>
            <div class="grid">
                <details class="char-card" name="chars"><summary>Perspective 01</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>Perspective 02</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>Perspective 03</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>Perspective 04</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>Perspective 05</summary><div class="expand-content"><p>[ ]</p></div></details>
                <details class="char-card" name="chars"><summary>Perspective 06</summary><div class="expand-content"><p>[ ]</p></div></details>
            </div>
        </section>

        <section id="glossary">
            <h2>Glossary</h2>
            <details name="sections">
                <summary>View</summary>
                <div class="expand-content">
                    <p>[ ]</p>
                </div>
            </details>
        </section>

    </div>

    <footer>
        <p>LIT CIRCLES PROJECT &bull; 2026</p>
    </footer>

</body>
</html>
