<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT Circles Project | Allies By Alan Gratz</title>
    <style>
        /* BLACK & WHITE DARK THEME */
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-dim: #cccccc;
            --accent: #ffffff; /* Keeping it strictly B&W */
            --border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Navigation Bar */
        nav {
            background-color: var(--bg);
            padding: 1.5rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--text-main);
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.6;
            text-decoration: underline;
        }

        /* Header */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-top: 80px;
        }

        header h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 15px;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Container & Sections */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        section {
            padding: 100px 0;
            border-bottom: 1px solid var(--border);
        }

        h2 {
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 40px;
            font-size: 2rem;
            text-decoration: underline;
            text-underline-offset: 10px;
        }

        .content-box {
            border: 1px solid var(--text-main);
            padding: 30px;
            background-color: #080808;
            color: var(--text-dim);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }

        .grid-item {
            border: 1px solid var(--text-main);
            padding: 25px;
            text-align: left;
        }

        .grid-item h3 {
            margin-bottom: 15px;
            border-bottom: 1px solid var(--text-main);
            display: inline-block;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            nav { gap: 15px; flex-wrap: wrap; }
            header h1 { letter-spacing: 5px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#summary">Theme</a>
        <a href="#summary">Summary</a>
        <a href="#pov">POV's</a>
        <a href="#notes">Extra Notes</a>
    </nav>

    <header id="home">
        <h1>ALLIES</h1>
        <p>A Lit Circle Project</p>
    </header>

    <div class="container">

        <section id="Theme">
            <h2>Theme</h2>
            <div class="content-box">
                <p>[ Info here ]</p>
            </div>
        </section>

        <section id="summary">
            <h2>Summary</h2>
            <div class="content-box">
                <p>[ Info here ]</p>
            </div>
        </section>

        <section id="pov">
            <h2>POVs</h2>
            <div class="grid">
                <div class="grid-item">
                    <h3>POV 01</h3>
                    <p>[ Info here ]</p>
                </div>
            </div>
        </section>

        <section id="notes">
            <h2>Extra Notes/ Facts</h2>
            <div class="content-box">
                <p>[ Info here ]</p>
            </div>
        </section>

    </div>

    <footer>
        <p>LIT CIRCLES PROJECT - ALLIES ALAN GRATZ</p>
    </footer>

</body>
</html>
