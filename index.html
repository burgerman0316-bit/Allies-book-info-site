<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT Circles Project | Allies By Alan Gratz</title>
    <link rel="icon" type="image/x-icon" href="favicon a.png">
    <style>
        :root {
            --bg: #000000;
            --text-main: #8B0000;
            --text-dim: #808080;
            --border: #222222;
            --card-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: "Courier New", Courier, "Lucida Sans Typewriter", "Lucida Typewriter", monospace;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 750px;
            padding: 0.8rem 2.5rem;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 30px;
            background: var(--glass);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: 0.3s;
        }

        nav a:hover { opacity: 1; }

        header {
            padding: 60px 20px 60px 20px;
            text-align: center;
        }

        header h1 {
            font-size: clamp(3.5rem, 12vw, 7rem);
            letter-spacing: 12px;
            text-transform: uppercase;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            padding: 80px 0;
            border-bottom: 1px solid var(--border);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        details {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        details[open] { border-color: #ffffff; }

        summary {
            padding: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            list-style: none;
            cursor: pointer;
            outline: none;
        }

        .content-inner {
            padding: 0 20px 20px 20px;
            color: var(--text-dim);
        }

        .timeline {
            position: relative;
            padding-left: 40px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 2px;
            height: 100%;
            background: var(--border);
        }

        .event {
            position: relative;
            margin-bottom: 20px;
        }

        .event details {
            background: transparent;
            border: 1px solid transparent;
            margin-bottom: 0;
        }
        
        .event details[open] {
            background: var(--card-bg);
            border-color: var(--border);
        }

        .event::before {
            content: '';
            position: absolute;
            left: -46px;
            top: 25px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid #ffffff;
            z-index: 2;
        }

        .event-time {
            color: #8B0000;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        footer {
            text-align: center;
            padding: 120px 20px;
            opacity: 0.2;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#sections">Sections of the Book</a>
        <a href="#timeline">Timeline</a>
        <a href="#pov">Characters</a>
        <a href="#theme">Theme</a>
    </nav>

    <header id="home">
        <h1>ALLIES</h1>
        <p style="letter-spacing: 6px; opacity: 0.5;">BY: ALAN GRATZ</p>
    </header>

    <div class="container">   
        <section id="sections">
            <h2>Sections of the book</h2>
            <details>
                <summary>Section I</summary>
                <div class="content-inner">
                    <p>[ ]</p>
                </div>
            </details>
        </section>

        <section id="timeline">
            <h2>Timeline</h2>
            <div class="timeline">
                <div class="event">
                    <details>
                        <summary><span class="event-time">Event I</span></summary>
                        <div class="content-inner"><p>[ ]</p></div>
                    </details>
                </div>
        </section>

        <section id="pov">
            <h2>Characters</h2>
            <div class="grid">
                <details><summary>Caracter I</summary><div class="content-inner"><p>[ ]</p></div></details>
            </div>
        </section>

        <section id="theme">
            <h2>Theme</h2>
            <details>
                <summary>Main Idea</summary>
                <div class="content-inner">
                    <p>[ ]</p>
                </div>
            </details>
        </section>
    </div>

    <footer>
        <p>Diesel and Madon &bull; 2026</p>
    </footer>

    <script>
        class Accordion {
          constructor(el) {
            this.el = el;
            this.summary = el.querySelector('summary');
            this.content = el.querySelector('.content-inner');
            this.animation = null;
            this.isClosing = false;
            this.isExpanding = false;
            this.summary.addEventListener('click', (e) => this.onClick(e));
          }

          onClick(e) {
            e.preventDefault();
            this.el.style.overflow = 'hidden';
            if (this.isClosing || !this.el.open) {
              this.open();
            } else if (this.isExpanding || this.el.open) {
              this.shrink();
            }
          }

          shrink() {
            this.isClosing = true;
            const startHeight = `${this.el.offsetHeight}px`;
            const endHeight = `${this.summary.offsetHeight}px`;
            if (this.animation) this.animation.cancel();
            
            this.animation = this.el.animate({
              height: [startHeight, endHeight]
            }, {
              duration: 400,
              easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
            });
            
            this.animation.onfinish = () => this.onAnimationFinish(false);
          }

          open() {
            this.el.style.height = `${this.el.offsetHeight}px`;
            this.el.open = true;
            window.requestAnimationFrame(() => this.expand());
          }

          expand() {
            this.isExpanding = true;
            const startHeight = `${this.el.offsetHeight}px`;
            const endHeight = `${this.summary.offsetHeight + this.content.offsetHeight}px`;
            if (this.animation) this.animation.cancel();
            
            this.animation = this.el.animate({
              height: [startHeight, endHeight]
            }, {
              duration: 400,
              easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
            });
            
            this.animation.onfinish = () => this.onAnimationFinish(true);
          }

          onAnimationFinish(open) {
            this.el.open = open;
            this.animation = null;
            this.isClosing = false;
            this.isExpanding = false;
            this.el.style.height = this.el.style.overflow = '';
          }
        }

        document.querySelectorAll('details').forEach((el) => {
          new Accordion(el);
        });
    </script>

</body>
</html>
